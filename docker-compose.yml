services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: sage
      POSTGRES_DB: sga
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sage -d sga"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "19175:19175"
    environment:
      PYTHONPATH: /app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./skills:/app/skills
      - ./world:/app/world
      - ./config.yaml:/app/config.yaml
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./scripts:/app/scripts
      - ./tests:/app/tests

volumes:
  pgdata:
